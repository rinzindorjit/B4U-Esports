```yaml
name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Check out the repository code
    - uses: actions/checkout@v3

    # Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Specify Node.js version (match your local version)
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    # Install dependencies in the server directory
    - name: Install Dependencies
      run: |
        cd server
        npm ci

    # Run tests (placeholder; add your test script in package.json)
    - name: Run Tests
      run: |
        cd server
        npm test
      env:
        CI: true

    # Optional: Trigger Render redeploy (uncomment and configure if needed)
    # - name: Trigger Render Redeploy
    #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    #   run: |
    #     curl -X POST \
    #     -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
    #     -H "Content-Type: application/json" \
    #     -d '{"serviceId": "${{ secrets.RENDER_SERVICE_ID }}"}' \
    #     https://api.render.com/v1/services/redeploy

